    tt_white:  [255,240,200] #was [255,250,240]
    tt_nwhite: [255,240,200]
    tt_wwhite: [255,230,170]
    tt_yellow: [255,220,  0]
    tt_orange: [240,100,  0]
    tt_blue:   [ 15, 72,255]
    tt_ltblue: [ 30,144,255]
    tt_red:    [255,  0,  0]
    tt_green:  [  0,255,  0]
