#config_version=6

# 1/3/2021 - Config file for Joust trough configure test with troughs as multiball locks and no default ball device for the playfield

# WARNING: The switch and coil numbers in this configuration file are for the P3_ROC.

hardware:
    platform: p3_roc
    driverboards: pdb
    lights: opp
    segment_displays: light_segment_displays
opp:
    ports: COM3
    debug: true
#    driverboards: gen2
p_roc:
    driverboards: pdb
    debug: true
config:
   #Yellow Displays
   - neoSeg_0.yaml
   - neoSeg_2dig_0.yaml
   - neoSeg_2dig_1.yaml
   #Blue Displays
   - neoSeg_1.yaml
   - neoSeg_2dig_2.yaml
   - neoSeg_2dig_3.yaml    
   - cabinet_lights.yaml 
