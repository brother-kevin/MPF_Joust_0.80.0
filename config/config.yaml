shows:
    release:
        - duration: 200ms
          lights:
              (led): (color)
        - duration: 100ms
          lights:
              (led): off
    offLED:
        - time: 0
          lights:
              (led): black
    offLED2:
        - duration: 1
          lights:
              (led): black
    color_on: #used by l_3bank
        - time: 0
          lights:
              (led): (color)    
    color_on2: #used by lavapit
        - time: 0
          lights:
              (led): (color)          
    flashColor:
        - time: 0
          lights:
              (led): (color)
        - time: "+1"
          lights:
              (led): off
    flashColor2:
        - duration: 1
          lights:
              (led): (color)
        - duration: 1
          lights:
              (led): off
    quickflashColor:
        - duration: 200ms
          lights:
              (led): (color)
        - duration: 100ms
          lights:
              (led): off
    sequenceColor:
        - time: 0
          lights:
              (led): (color)
        - time: "+1"
          lights:
              (ledB): (color)
        - time: "+1"
          lights:
              (led): off
              (ledC): (color)
        - time: "+1"
          lights:
              (ledB): off
              (ledD): (color)
        - time: "+1"
          lights:
