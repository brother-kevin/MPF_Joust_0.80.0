#config_version=6
#this mode is a branch of the "base" mode for a cooperative game where the score is combined and the lives are combined

mode:
    start_events: 
      - carousel_co-op_selected
      - mode_co-op_player_start
      - ball_started{machine.selected_game_mode=='co-op'}
    priority: 803
event_player:
    mode_co-op_started:
      - enable_prevent_drain 
      - enable_p1_flipper
      - enable_double_player      
    logicblock_cooperative_balls_updated{device.counters.cooperative_balls.value==1}: #this is to drain to 1 ball before ending 
      - enable_front_lock
#      - enable_back_lock #eliminated one of the ball locks for the rare case balls drain at the same time they will lock before the ball count gets to 0
#      - coop_end
    p1_disap_t_roll_hit{device.counters.cooperative_balls.value>=2}:
      - start_tunnel_multiball
      - start_tunnel_multiball_accrual
      - eject_all #this is needed because for some reason after the first game - will not eject balls 
      - disable_front_lock
      - disable_back_lock
    p2_disap_t_roll_hit{device.counters.cooperative_balls.value>=2}: 
      - start_tunnel_multiball
      - start_tunnel_multiball_accrual
      - eject_all #this is needed because for some reason after the first game - will not eject balls 
      - disable_front_lock
      - disable_back_lock
    mode_unlimited_multiball_started: 
      - enable_p1_flipper
      - enable_double_player
    multiball_lock_etm_coop_full:
      - lives_counter_enable
multiball_locks:    
    etm_coop:
        balls_to_lock: 2
        enable_events: end_tunnel_multiball
        disable_events: round1end, start_tunnel_multiball  
        lock_devices: bd_trough_front, bd_trough_back
        balls_to_replace: 0 #A value of 0 means the lock will never replace balls to the playfield from the default source (bd_trough_front), and -1 means it will always replace balls
        locked_ball_counting_strategy: physical_only
counters:
    cooperative_balls:
        count_events: s_p1_trough4_active, s_p2_trough4_active       
        events_when_complete: round1end
        starting_count: 8
        count_interval: 1
        direction: down
        count_complete_value: 0
        reset_on_complete: false
        control_events:
          - event: logicblock_cooperative_p1_hunter_group_count_complete
            action: add
            value: 1            
          - event: logicblock_cooperative_p2_hunter_group_count_complete
            action: add
            value: 1
        disable_events: start_tunnel_multiball
        enable_events: mode_co-op_started, lives_counter_enable #{device.counters.cooperative_balls.value > 0} #timer_p1_tunnel_multiball_complete, timer_p2_tunnel_multiball_complete
        debug: true 
    cooperative_p1_hunter_group_count:
        count_events: p1_hunter_shot_group_complete
        events_when_hit: p1_hunter_group_done
        starting_count: 0
        direction: up
        persist_state: true 
        count_complete_value: 3
        reset_on_complete: true
        disable_on_complete: false
        disable_events: mode_single_player_started, mode_double_player_started
        multiple_hit_window: 500ms               
    cooperative_p2_hunter_group_count:
        count_events: p2_hunter_shot_group_complete
        events_when_hit: p2_hunter_group_done
        starting_count: 0
        direction: up
        persist_state: true 
        count_complete_value: 3
        reset_on_complete: true
        disable_on_complete: false
        multiple_hit_window: 500ms
        disable_events: mode_single_player_started, mode_double_player_started         
show_player:
    player_total_score:
        P1_score:
            show_tokens:
                txt: "{current_player.total_score:0>1,d}"
            key: p1score
        P2_score:
            show_tokens:
                txt: "{current_player.total_score:0>1,d}"
            key: p2score
    player_cooperative_balls: #need to make sure this is the player variable
        P1_lives:
            show_tokens:
                txt: "{current_player.cooperative_balls:0>1d}"
            key: p1lives_1
        P2_lives:
            show_tokens:
                txt: "{current_player.cooperative_balls:0>1d}"
            key: p2lives_2
    player_timer_unlimited_multiball_variable{value>0}:  #need to make sure this is the player variable
        P1_timer:
            show_tokens:
                txt: "{current_player.timer_unlimited_multiball_variable:0>1d}"
            key: timer1
        P2_timer:
            show_tokens:
                txt: "{current_player.timer_unlimited_multiball_variable:0>1d}"
            key: timer2
variable_player:    
    logicblock_cooperative_balls_updated:
        cooperative_balls:
           int: value
           action: set                   
    player_p1_score:
        total_score:
           int: current_player.p1_score + current_player.p2_score
           action: set
    player_p2_score:
        total_score:
           int: current_player.p1_score + current_player.p2_score
           action: set 
    player_p1_egg_bonus:
        total_egg_bonus:
           int: current_player.p1_egg_bonus + current_player.p2_egg_bonus
           action: set
    player_p2_egg_bonus:
        total_egg_bonus:
           int: current_player.p1_egg_bonus + current_player.p2_egg_bonus
           action: set


sound_player:
    mode_co-op_started: 
      player_start:
         action: play   
