#config_version=6
# Carousel mode: shows game mode menu, A cycles, L selects
mode:
  start_events: machine_reset_phase_3
  stop_events: ball_starting
  code: mpf.modes.carousel.code.carousel.Carousel
  game_mode: false
  priority: 1000

mode_settings:
  selectable_items: double_player, co-op, single_player, instructions
  select_item_events: do_select
  next_item_events: do_next
  previous_item_events: s_p1_hunter_bull_3_inactive
  wrap_items: true

state_machines:
  carousel_tracker:
    states:
      on_game_mode:
        label: "On Game Mode"
      on_instructions:
        label: "On Instructions"
    starting_state: on_game_mode
    transitions:
      - source: on_game_mode
        target: on_instructions
        events: carousel_item_highlighted{item=="instructions"}
      - source: on_instructions
        target: on_game_mode
        events: carousel_item_highlighted{item!="instructions"}

# Translate generic carousel events into per-item events
event_player:
  s_p1_l_flipper_button_active: do_next
  s_p1_r_flipper_button_active{device.state_machines.carousel_tracker.state=="on_game_mode"}: do_select
  s_p1_r_flipper_button_active{device.state_machines.carousel_tracker.state=="on_instructions"}: do_next

  carousel_item_highlighted{item=="double_player"}:
    show_carousel_competitive: {}
  carousel_item_highlighted{item=="co-op"}:
    show_carousel_cooperative: {}
  carousel_item_highlighted{item=="single_player"}:
    show_carousel_single: {}
  carousel_item_highlighted{item=="instructions"}:
    show_carousel_instructions: {}

  # Selection events
  carousel_item_selected{item=="double_player"}:
    - select_double_player
    - set_selected_game_mode_competitive
  carousel_item_selected{item=="co-op"}:
    - select_co-op_player
    - set_selected_game_mode_co-op
  carousel_item_selected{item=="single_player"}:
    - select_single_player
    - set_selected_game_mode_single

  # Trigger the game start
  carousel_item_selected{item!="instructions"}:
    request_to_start_game: {}

  # Map events to mode starts (Original repo style)
  select_double_player: mode_double_player_start
  select_co-op_player: mode_co-op_player_start
  select_single_player: mode_single_player_start

variable_player:
  set_selected_game_mode_competitive:
    selected_game_mode:
      string: double_player
      action: set_machine
  set_selected_game_mode_co-op:
    selected_game_mode:
      string: co-op
      action: set_machine
  set_selected_game_mode_single:
    selected_game_mode:
      string: single_player
      action: set_machine

slide_player:
  # Initial slide on mode start
  mode_carousel_started:
    carousel_competitive:
      action: play
      priority: 9999
      target: display1
  # Each highlight event: remove ALL carousel slides, then play the correct one
  show_carousel_competitive:
    carousel_cooperative:
      action: remove
      target: display1
    carousel_single:
      action: remove
      target: display1
    joust_tips:
      action: remove
      target: display1
    carousel_competitive:
      action: play
      priority: 9999
      target: display1
  show_carousel_cooperative:
    carousel_competitive:
      action: remove
      target: display1
    carousel_single:
      action: remove
      target: display1
    joust_tips:
      action: remove
      target: display1
    carousel_cooperative:
      action: play
      priority: 9999
      target: display1
  show_carousel_single:
    carousel_competitive:
      action: remove
      target: display1
    carousel_cooperative:
      action: remove
      target: display1
    joust_tips:
      action: remove
      target: display1
    carousel_single:
      action: play
      priority: 9999
      target: display1
  show_carousel_instructions:
    carousel_competitive:
      action: remove
      target: display1
    carousel_cooperative:
      action: remove
      target: display1
    carousel_single:
      action: remove
      target: display1
    joust_tips:
      action: play
      priority: 9999
      target: display1


sound_player:
    mode_carousel_started: DrainRollover
