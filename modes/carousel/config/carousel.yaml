#config_version=6
# Carousel mode: shows game mode menu, A cycles, L selects
mode:
  start_events: machine_reset_phase_3
  stop_events: carousel_item_selected
  code: mpf.modes.carousel.code.carousel.Carousel
  game_mode: false
  priority: 1000

mode_settings:
  selectable_items: double_player, co-op, single_player
  select_item_events: s_p1_r_flipper_button_active
  next_item_events: s_p1_l_flipper_button_active
  previous_item_events: s_p1_hunter_bull_3_inactive
  wrap_items: true

# Translate generic carousel events into per-item events
event_player:
  carousel_item_highlighted{item=="double_player"}:
    show_carousel_competitive: {}
  carousel_item_highlighted{item=="co-op"}:
    show_carousel_cooperative: {}
  carousel_item_highlighted{item=="single_player"}:
    show_carousel_single: {}
  carousel_item_selected{item=="double_player"}:
    carousel_double_player_selected: {}
  carousel_item_selected{item=="co-op"}:
    carousel_co-op_selected: {}
  carousel_item_selected{item=="single_player"}:
    carousel_single_player_selected: {}
  carousel_item_selected:
    s_start_active: {}

slide_player:
  # Initial slide on mode start
  mode_carousel_started:
    carousel_competitive:
      action: play
      priority: 9999
      target: display1
  # Each highlight event: remove ALL carousel slides, then play the correct one
  show_carousel_competitive:
    carousel_cooperative:
      action: remove
      target: display1
    carousel_single:
      action: remove
      target: display1
    carousel_competitive:
      action: play
      priority: 9999
      target: display1
  show_carousel_cooperative:
    carousel_competitive:
      action: remove
      target: display1
    carousel_single:
      action: remove
      target: display1
    carousel_cooperative:
      action: play
      priority: 9999
      target: display1
  show_carousel_single:
    carousel_competitive:
      action: remove
      target: display1
    carousel_cooperative:
      action: remove
      target: display1
    carousel_single:
      action: play
      priority: 9999
      target: display1
